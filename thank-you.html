<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Revenue Prompts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #22c55e;
            --border: #27272a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        
        .checkmark { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 2rem; margin-bottom: 15px; color: var(--accent); }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; }
        
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin: 30px 0; }
        
        .btn { display: inline-block; background: var(--accent); color: #000; padding: 16px 40px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: all 0.2s; }
        .btn:hover { background: #16a34a; transform: translateY(-2px); }
        
        .note { font-size: 0.9rem; color: var(--text-muted); margin-top: 20px; }
        
        footer { margin-top: 50px; color: var(--text-muted); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h1>Payment Confirmed!</h1>
        <p>Thank you for your purchase. Your Revenue Prompts are ready.</p>
        
        <div class="card">
            <a href="https://github.com/evaolennikov-blip/revenue-prompts-deliverable/releases/download/v1.0/revenue-prompts-v1.zip" class="btn">
                📦 Download Your Prompts
            </a>
        </div>
        
        <p class="note">
            Having trouble? Email us and we'll send the download link directly.
        </p>
        
        <footer>
            <p>Questions? Reply to your receipt email.</p>
        </footer>
    </div>
</body>
</html>
